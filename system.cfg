[debug]
verbose_debug_info = on
display_skip_button = on

[google]
# URL パラメータの project_id が未登録の場合はこの URL に fallback（デフォルト）
app_script_url = https://script.google.com/macros/s/AKfycbx4vCnOp3Qegn4vhr520S8qxomrfYH_y7Jh5k6R9jz1zVsnTZP5f9g-GHT7uFkYRQg8/exec

# プロジェクトごとに [project.<任意名>] セクションを追加する。
# project_id, project_name, app_script_url の 3 つを必ず指定。
# URL パラメータ ?project_id=<id> で project_id フィールドが一致するセクションがルックアップされる。
# 未指定 / 未登録時は [google] app_script_url にフォールバック（project_name は空文字）。
#
# 例:
# [project.alpha]
# project_id = alpha
# project_name = アルファ実験
# app_script_url = https://script.google.com/macros/s/AKfycbx.../exec
#
# [project.beta]
# project_id = beta
# project_name = ベータ実験
# app_script_url = https://script.google.com/macros/s/AKfycbx.../exec

 [project.default]
 project_id = 0
 project_name = テスト用
 app_script_url = https://script.google.com/macros/s/AKfycbx4vCnOp3Qegn4vhr520S8qxomrfYH_y7Jh5k6R9jz1zVsnTZP5f9g-GHT7uFkYRQg8/exec


